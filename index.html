<!-- Fonte "Pacifico" para letra cursiva grossa e "Montserrat" para o texto -->
<link href="https://googleapis.com" rel="stylesheet">

<style>
    header {
        background-color: #000000; /* Fundo preto total para destacar o vermelho */
        padding: 60px 20px;
        text-align: center;
        border-bottom: 5px solid #ff0000; /* Linha vermelha grossa na base */
    }

    /* Nome AM Service: Cursiva, Grossa e Vermelha */
    .nome-logo {
        font-family: 'Pacifico', cursive;
        font-size: 5rem;    /* Tamanho grande e chamativo */
        color: #ff0000;    /* Vermelho puro e vibrante */
        margin: 0;
        text-shadow: 3px 3px 0px #ffffff, 6px 6px 0px rgba(0,0,0,0.2); /* Sombra branca para "saltar" da tela */
        line-height: 1.2;
    }
    
    .subtitulo {
        font-family: 'Montserrat', sans-serif;
        font-size: 1.3rem;
        color: #ffffff;
        margin-top: 15px;
        font-weight: 700;
        text-transform: uppercase; /* Letras maiúsculas para o subtítulo */
        letter-spacing: 2px;
    }

    .localizacao {
        font-family: 'Montserrat', sans-serif;
        font-size: 1.1rem;
        color: #ff0000; /* Localização em vermelho também */
        margin-top: 10px;
        font-weight: 400;
    }
</style>

<header>
    <h1 class="nome-logo">AM Service</h1>
    <p class="subtitulo">Mecânica Automotiva Especializada</p>
    <p class="localizacao">📍 Curitiba - PR | Arley Marcelo</p>
</header>
